<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#7c3aed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Inventory Pro | نظام إدارة المخزون المتطور</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Dexie.js -->
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
    
    <!-- QR Code Scanner & Generator -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- SheetJS for Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- FileSaver -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <!-- html2canvas for QR printing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
        
        * {
            font-family: 'Cairo', sans-serif;
        }
        
        .mono-font {
            font-family: 'IBM Plex Mono', monospace;
            direction: ltr;
            text-align: left;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2f 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated background with glowing orbs */
        .bg-orb {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 20s infinite ease-in-out;
        }
        
        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(124, 58, 237, 0.3);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }
        
        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(236, 72, 153, 0.2);
            bottom: -200px;
            left: -200px;
            animation-delay: -5s;
        }
        
        .orb-3 {
            width: 300px;
            height: 300px;
            background: rgba(59, 130, 246, 0.25);
            top: 50%;
            left: 30%;
            animation-delay: -10s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, 50px) scale(1.1); }
            50% { transform: translate(-30px, 20px) scale(0.9); }
            75% { transform: translate(40px, -40px) scale(1.05); }
        }
        
        /* Glassmorphism with dark theme */
        .glass-dark {
            background: rgba(18, 18, 30, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border-radius: 28px;
        }
        
        .glass-card {
            background: rgba(25, 25, 40, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 24px;
        }
        
        .glass-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(124, 58, 237, 0.4);
            box-shadow: 0 20px 40px rgba(124, 58, 237, 0.3);
            background: rgba(35, 35, 50, 0.9);
        }
        
        /* Gradient buttons with enhanced effects */
        .btn-gradient-primary {
            background: linear-gradient(135deg, #7c3aed 0%, #c026d3 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .btn-gradient-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-gradient-primary:hover::before {
            left: 100%;
        }
        
        .btn-gradient-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(124, 58, 237, 0.5);
        }
        
        .btn-gradient-success {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            border-radius: 18px;
            font-weight: 700;
        }
        
        .btn-gradient-warning {
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
            border-radius: 18px;
            font-weight: 700;
        }
        
        .btn-gradient-danger {
            background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
            border-radius: 18px;
            font-weight: 700;
        }
        
        .btn-gradient-info {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            border-radius: 18px;
            font-weight: 700;
        }
        
        /* Status badges */
        .status-badge {
            padding: 0.4rem 1.2rem;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }
        
        .status-available {
            background: linear-gradient(135deg, rgba(5, 150, 105, 0.3), rgba(16, 185, 129, 0.3));
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }
        
        .status-issued {
            background: linear-gradient(135deg, rgba(217, 119, 6, 0.3), rgba(245, 158, 11, 0.3));
            color: #fcd34d;
            border: 1px solid rgba(245, 158, 11, 0.4);
        }
        
        .status-maintenance {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.3), rgba(239, 68, 68, 0.3));
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }
        
        /* Progress bar */
        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 12px 0;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .progress-available {
            background: linear-gradient(90deg, #10b981, #34d399);
        }
        
        .progress-issued {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }
        
        .progress-maintenance {
            background: linear-gradient(90deg, #ef4444, #f87171);
        }
        
        /* Toast notifications */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .toast {
            padding: 16px 24px;
            border-radius: 18px;
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.3s ease forwards;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 320px;
            font-size: 1rem;
        }
        
        .toast.success {
            background: linear-gradient(135deg, rgba(5, 150, 105, 0.95), rgba(16, 185, 129, 0.95));
        }
        
        .toast.error {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.95), rgba(239, 68, 68, 0.95));
        }
        
        .toast.warning {
            background: linear-gradient(135deg, rgba(217, 119, 6, 0.95), rgba(245, 158, 11, 0.95));
        }
        
        .toast.info {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.95), rgba(59, 130, 246, 0.95));
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .toast.fade-out {
            animation: fadeOut 0.3s ease forwards;
        }
        
        @keyframes fadeOut {
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
        
        /* Scanner container */
        .scanner-container {
            border-radius: 28px;
            overflow: hidden;
            border: 2px solid rgba(124, 58, 237, 0.4);
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.3);
            position: relative;
            min-height: 300px;
            background: #000;
        }
        
        #reader {
            width: 100% !important;
            border: none !important;
            border-radius: 28px !important;
        }
        
        #reader video {
            border-radius: 28px !important;
            width: 100% !important;
            height: auto !important;
        }
        
        #reader__scan_region {
            background: transparent !important;
            border-radius: 28px !important;
            min-height: 300px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        
        #reader__dashboard_section {
            background: rgba(0, 0, 0, 0.5) !important;
            border-radius: 0 0 28px 28px !important;
            color: white !important;
        }
        
        #reader__dashboard_section button {
            background: linear-gradient(135deg, #7c3aed 0%, #c026d3 100%) !important;
            color: white !important;
            border: none !important;
            border-radius: 12px !important;
            padding: 8px 16px !important;
            margin: 5px !important;
        }
        
        /* QR Code container */
        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            border: 4px solid rgba(124, 58, 237, 0.2);
        }
        
        /* Form inputs */
        .form-input {
            background: rgba(31, 31, 45, 0.8);
            border: 2px solid rgba(124, 58, 237, 0.2);
            border-radius: 18px;
            padding: 16px 20px;
            color: white;
            transition: all 0.3s ease;
            width: 100%;
            font-size: 1rem;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.3);
            background: rgba(35, 35, 50, 0.95);
        }
        
        .form-input::placeholder {
            color: rgba(156, 163, 175, 0.5);
        }
        
        /* Stats cards */
        .stat-card {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.15), rgba(236, 72, 153, 0.15));
            border-radius: 28px;
            padding: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: scale(1.05);
            border-color: rgba(124, 58, 237, 0.3);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.2);
        }
        
        /* Counter animation */
        .counter-number {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            direction: ltr;
            display: inline-block;
            font-size: 2rem;
            background: linear-gradient(135deg, #fff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #7c3aed, #c026d3);
            border-radius: 6px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #8b5cf6, #d946ef);
        }
        
        /* Print styles */
        @media print {
            .no-print {
                display: none !important;
            }
            
            body {
                background: white;
                padding: 20px;
            }
            
            .print-page {
                page-break-after: always;
                page-break-inside: avoid;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: white;
            }
            
            .qr-card {
                box-shadow: none;
                border: 1px solid #ddd;
            }
            
            .stickers-grid {
                page-break-after: always;
                page-break-inside: avoid;
            }
            
            .sticker {
                break-inside: avoid;
            }
        }
        
        /* Camera switch button */
        .camera-switch-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 2px solid rgba(124, 58, 237, 0.5);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .camera-switch-btn:hover {
            background: rgba(124, 58, 237, 0.8);
            transform: rotate(180deg);
        }
        
        /* Location badge */
        .location-badge {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.2), rgba(59, 130, 246, 0.2));
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 8px 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #93c5fd;
            font-size: 0.9rem;
        }

        /* Age selection */
        .selected-age {
            border-color: rgba(124, 58, 237, 0.8) !important;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.3);
        }

        select optgroup {
            background: #1f1f2d;
            color: #a78bfa;
            font-weight: bold;
        }

        select option {
            background: #1f1f2d;
            color: white;
        }

        /* Age badge styles */
        .age-badge-new {
            background: linear-gradient(135deg, rgba(5,150,105,0.25), rgba(16,185,129,0.25));
            color: #6ee7b7;
            border: 1px solid rgba(16,185,129,0.4);
            padding: 2px 10px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .age-badge-used {
            background: linear-gradient(135deg, rgba(217,119,6,0.25), rgba(245,158,11,0.25));
            color: #fcd34d;
            border: 1px solid rgba(245,158,11,0.4);
            padding: 2px 10px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="p-4 md:p-6">
    <!-- Animated Background Orbs -->
    <div class="bg-orb">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div id="app" class="max-w-7xl mx-auto relative">
        <!-- Header with animated gradient -->
        <header class="glass-dark p-8 mb-8 text-center animate__animated animate__fadeInDown relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-r from-purple-600/20 via-transparent to-pink-600/20 animate-pulse"></div>
            <h1 class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-l from-purple-400 via-pink-500 to-purple-400 mb-3">
                <i class="fas fa-cubes ml-3 text-purple-400"></i>
                Inventory Pro
            </h1>
            <p class="text-gray-300 text-lg md:text-xl">نظام إدارة المخزون والمعدات الذكي</p>
            <div class="mt-6 flex justify-center gap-3 text-sm flex-wrap">
                <span class="bg-purple-900/40 text-purple-300 px-4 py-2 rounded-full border border-purple-500/30 backdrop-blur-sm">
                    <i class="fas fa-database ml-2"></i> يعمل بدون إنترنت
                </span>
                <span class="bg-pink-900/40 text-pink-300 px-4 py-2 rounded-full border border-pink-500/30 backdrop-blur-sm">
                    <i class="fas fa-mobile-alt ml-2"></i> PWA متكامل
                </span>
                <span class="bg-blue-900/40 text-blue-300 px-4 py-2 rounded-full border border-blue-500/30 backdrop-blur-sm">
                    <i class="fas fa-qrcode ml-2"></i> QR Scanner Pro
                </span>
            </div>
        </header>

        <!-- Quick Stats with animated counters -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8" id="statsSection"></div>

        <!-- Main Actions -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-8">
            <button onclick="showScanner()" class="btn-gradient-primary text-white p-4 rounded-xl font-bold text-sm md:text-base flex flex-col items-center gap-2 card-hover animate__animated animate__fadeInUp hover:scale-105 transition-all shadow-lg" style="animation-delay: 0.1s">
                <i class="fas fa-camera text-2xl"></i>
                <span>مسح QR</span>
            </button>
            
            <button onclick="showAddForm()" class="btn-gradient-success text-white p-4 rounded-xl font-bold text-sm md:text-base flex flex-col items-center gap-2 card-hover animate__animated animate__fadeInUp hover:scale-105 transition-all shadow-lg" style="animation-delay: 0.15s">
                <i class="fas fa-plus-circle text-2xl"></i>
                <span>إضافة معدة</span>
            </button>
            
            <button onclick="showItems()" class="btn-gradient-primary text-white p-4 rounded-xl font-bold text-sm md:text-base flex flex-col items-center gap-2 card-hover animate__animated animate__fadeInUp hover:scale-105 transition-all shadow-lg" style="animation-delay: 0.2s">
                <i class="fas fa-list text-2xl"></i>
                <span>عرض المخزون</span>
            </button>
            
            <button onclick="showExport()" class="btn-gradient-warning text-white p-4 rounded-xl font-bold text-sm md:text-base flex flex-col items-center gap-2 card-hover animate__animated animate__fadeInUp hover:scale-105 transition-all shadow-lg" style="animation-delay: 0.25s">
                <i class="fas fa-file-export text-2xl"></i>
                <span>تصدير/استيراد</span>
            </button>

            <button onclick="showPrintOptions()" class="btn-gradient-info text-white p-4 rounded-xl font-bold text-sm md:text-base flex flex-col items-center gap-2 card-hover animate__animated animate__fadeInUp hover:scale-105 transition-all shadow-lg" style="animation-delay: 0.3s">
                <i class="fas fa-print text-2xl"></i>
                <span>طباعة QR</span>
            </button>
        </div>

        <!-- Search Bar -->
        <div class="glass-dark p-4 mb-6 flex gap-3 items-center animate__animated animate__fadeIn">
            <i class="fas fa-search text-purple-400 text-xl"></i>
            <input type="text" id="globalSearch" placeholder="ابحث عن معدة بالاسم، الكود، التصنيف أو الموقع..." 
                   class="form-input flex-1" onkeyup="globalSearch()">
        </div>

        <!-- Content Area -->
        <div id="contentArea" class="space-y-6"></div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Hidden QR Print Container -->
    <div id="qrPrintContainer" style="position: fixed; left: -9999px; top: 0;"></div>

    <script>
        // ==================== Enhanced Toast System ====================
        function showToast(message, type = 'success', duration = 3000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type} animate__animated animate__fadeInLeft`;
            
            const icons = {
                success: '<i class="fas fa-check-circle text-xl"></i>',
                error: '<i class="fas fa-times-circle text-xl"></i>',
                warning: '<i class="fas fa-exclamation-triangle text-xl"></i>',
                info: '<i class="fas fa-info-circle text-xl"></i>'
            };
            
            toast.innerHTML = `
                ${icons[type]}
                <span class="flex-1">${message}</span>
                <button onclick="this.parentElement.classList.add('fade-out'); setTimeout(() => this.parentElement.remove(), 300)" class="text-white/70 hover:text-white">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.classList.add('fade-out');
                    setTimeout(() => {
                        if (toast.parentElement) toast.remove();
                    }, 300);
                }
            }, duration);
        }

        // ==================== Animated Counter ====================
        function animateCounter(element, target, duration = 1000) {
            if (!element) return;
            const start = 0;
            const increment = target / (duration / 16);
            let current = start;
            
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    current = target;
                    clearInterval(timer);
                }
                element.textContent = Math.floor(current).toString();
            }, 16);
        }

        // ==================== Database Setup ====================
        const db = new Dexie('InventoryProDB');
        
        db.version(3).stores({
            items: '++id, qrCode, name, category, status, currentLocation, createdAt, lastUpdated, modelNumber',
            transactions: '++id, itemId, actionType, destination, destinationLocation, notes, duration, timestamp'
        });

        // ==================== Update Stats with Animation ====================
        async function updateStats() {
            const items = await db.items.toArray();
            const total = items.length;
            const available = items.filter(i => i.status === 'متوفر').length;
            const issued = items.filter(i => i.status === 'مصروف').length;
            const maintenance = items.filter(i => i.status === 'صيانة').length;

            const statsHtml = `
                <div class="stat-card text-center animate__animated animate__fadeInUp" style="animation-delay: 0.1s">
                    <div class="text-purple-400 text-3xl mb-2"><i class="fas fa-cubes"></i></div>
                    <div class="counter-number text-3xl font-bold text-white mb-1" id="totalCount">0</div>
                    <div class="text-gray-400 text-sm">إجمالي المعدات</div>
                    <div class="progress-bar mt-3">
                        <div class="progress-fill progress-available" style="width: ${total ? (available/total*100) : 0}%"></div>
                    </div>
                </div>

        async function addItem(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            
            const name = formData.get('name');
            const category = formData.get('category');
            const location = formData.get('location') || 'المخزن الرئيسي';
            const customQr = formData.get('qrCode');
            const modelNumber = formData.get('modelNumber');
            const itemAge = formData.get('itemAge') || 'جديدة';
            
            // تحديد كود QR: إذا تم إدخال رقم موديل، استخدمه كـ QR Code
            let qrCode;
            if (modelNumber && modelNumber.trim() !== '') {
                qrCode = modelNumber.trim();
            } else if (customQr && customQr.trim() !== '') {
                qrCode = customQr.trim();
            } else {
                qrCode = `INV-${Date.now()}-${Math.random().toString(36).substr(2, 8).toUpperCase()}`;
            }
            
            try {
                const existing = await db.items.where('qrCode').equals(qrCode).first();
                if (existing) {
                    showToast('هذا الكود مستخدم مسبقاً', 'warning');
                    return;
                }
                
                const now = new Date();
                await db.items.add({
                    name,
                    category,
                    qrCode,
                    modelNumber: modelNumber || null,
                    itemAge,
                    status: 'متوفر',
                    currentLocation: location,
                    createdAt: now,
                    lastUpdated: now
                });
                
                showToast('✅ تم إضافة المعدة بنجاح', 'success');
                updateStats();
                showItems();
            } catch (error) {
                showToast('❌ فشلت الإضافة: ' + error.message, 'error');
            }
        }

        async function startScanner() {
            // Stop any running scanner first
            await stopScannerOnly();

            const readerEl = document.getElementById('reader');
            if (!readerEl) return;

            const statusEl = document.getElementById('scanStatus');
            if (statusEl) statusEl.textContent = 'جاري تشغيل الكاميرا...';

            try {
                html5QrCode = new Html5Qrcode("reader");

                const config = {
                    fps: 10,
                    qrbox: function(viewfinderWidth, viewfinderHeight) {
                        const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
                        return { width: Math.floor(minEdge * 0.7), height: Math.floor(minEdge * 0.7) };
                    },
                    rememberLastUsedCamera: false,
                    aspectRatio: 1.0
                };

                // Try to get cameras first
                const devices = await Html5Qrcode.getCameras();
                
                if (devices && devices.length > 0) {
                    let cameraId;
                    
                    // Try to find back camera
                    if (currentFacingMode === "environment") {
                        const backCam = devices.find(d => /back|rear|environment/i.test(d.label));
                        if (backCam) {
                            cameraId = backCam.id;
                        } else {
                            // If no back camera found, use last camera
                            cameraId = devices[devices.length - 1].id;
                        }
                    } else {
                        const frontCam = devices.find(d => /front|user|face/i.test(d.label));
                        if (frontCam) {
                            cameraId = frontCam.id;
                        } else {
                            cameraId = devices[0].id;
                        }
                    }

                    await html5QrCode.start(
                        cameraId,
                        config,
                        onScanSuccess,
                        (errorMessage) => {
                            // Silent scan errors
                        }
                    );
                    
                    scannerRunning = true;
                    if (statusEl) statusEl.textContent = '✅ الكاميرا تعمل، انتظر المسح...';
                } else {

                } catch(e) {}
                scannerRunning = false;

            }
        }

        function getCurrentLocation() {
            if (!navigator.geolocation) {
                showToast('متصفحك لا يدعم تحديد الموقع الجغرافي', 'error');
                return;
            }
            
            const btn = document.querySelector('button[onclick="getCurrentLocation()"]');
            if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; }
            showToast('جاري الحصول على موقعك الجغرافي...', 'info', 5000);
            
            const geoOptions = {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 0
            };

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const url = `https://www.google.com/maps?q=${lat},${lng}`;
                    const input = document.querySelector('input[name="locationUrl"]');
                    if (input) {
                        input.value = url;
                    }
                    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-location-dot"></i>'; }
                    showToast(`✅ تم تحديد الموقع (${lat.toFixed(5)}, ${lng.toFixed(5)})`, 'success');
                },
                (error) => {
                    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-location-dot"></i>'; }
                    let msg = 'فشل تحديد الموقع';
                    switch (error.code) {
                        case error.PERMISSION_DENIED:
                            msg = 'تم رفض الإذن - يرجى السماح بالوصول للموقع من إعدادات المتصفح';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            msg = 'الموقع غير متاح حالياً، حاول مرة أخرى';
                            break;
                        case error.TIMEOUT:
                            msg = 'انتهت مهلة تحديد الموقع، حاول مرة أخرى';
                            break;
                    }
                    showToast('⚠️ ' + msg, 'warning', 5000);
                },
                geoOptions
            );
        }

        function downloadQRCode(qrText) {
            const qrContainer = document.createElement('div');
            qrContainer.style.position = 'absolute';
            qrContainer.style.left = '-9999px';
            document.body.appendChild(qrContainer);
            
            new QRCode(qrContainer, {
                text: qrText,
                width: 300,
                height: 300
            });
            
            setTimeout(() => {
                const canvas = qrContainer.querySelector('canvas');
                if (canvas) {
                    const link = document.createElement('a');
                    link.download = `QR-${qrText}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                }
                document.body.removeChild(qrContainer);
                showToast('✅ تم تحميل QR Code', 'success');
            }, 100);
        }

                                <div class="sticker-name">${item.name}</div>
                                <div class="sticker-code">${item.qrCode}</div>
                                ${item.modelNumber ? `<div class="sticker-model">موديل: ${item.modelNumber}</div>` : ''}
                            </div>
                        `);
                    } else {
                        // Empty sticker for grid alignment
                        printWindow.document.write('<div class="sticker" style="border: none; background: transparent;"></div>');
                    }
                }
                
                printWindow.document.write('</div></div>');
            }

            printWindow.document.write(`
                <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>
                <script>
            `);

            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                printWindow.document.write(`
                    new QRCode(document.getElementById("qr-${i}"), {
                        text: "${item.qrCode}",
                        width: 120,
                        height: 120,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                `);
            }

            printWindow.document.write(`
                    setTimeout(() => { window.print(); }, 1000);
                <\/script>
            </body>
            </html>`);

            printWindow.document.close();
            showToast('جاري طباعة الملصقات', 'info');
        }

        async function getItemAndShow(id) {
            const item = await db.items.get(id);
            if (item) showItemDetails(item);
        }

        async function issueItem(event, itemId) {
            event.preventDefault();
            const formData = new FormData(event.target);
            
            const destination = formData.get('destination');
            const locationUrl = formData.get('locationUrl');
            const actionType = formData.get('actionType');
            const duration = formData.get('duration');
            const notes = formData.get('notes');
            
            try {
                await db.items.update(itemId, {
                    status: actionType === 'صيانة' ? 'صيانة' : 'مصروف',
                    currentLocation: destination,
                    lastUpdated: new Date()
                });
                
                await db.transactions.add({
                    itemId: itemId,
                    actionType: actionType,
                    destination: destination,
                    destinationLocation: locationUrl,
                    duration: duration || null,
                    notes: notes,
                    timestamp: new Date()
                });
                
                // عرض خيار مشاركة الموقع
                if (locationUrl) {
                    setTimeout(() => {
                        if (confirm('هل تريد مشاركة موقع الصرف عبر واتساب؟')) {
                            shareLocationViaWhatsApp(destination, locationUrl, notes);
                        }
                    }, 500);
                }
                
                showToast('✅ تم صرف المعدة بنجاح', 'success');
                updateStats();
                showItems();
            } catch (error) {
                showToast('❌ فشلت العملية: ' + error.message, 'error');
            }
        }

        function shareLocationViaWhatsApp(destination, locationUrl, notes) {
            const message = `📍 *معدة مصروفة*\n` +
            `🏢 الجهة: ${destination}\n` +
            `📍 الموقع: ${locationUrl}\n` +
            `📝 ملاحظات: ${notes || 'لا توجد'}\n` +
            `🕐 ${new Date().toLocaleString('ar-EG')}`;
            
            const url = `https://wa.me/?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        }

        async function returnItem(itemId) {
            try {
                await db.items.update(itemId, {
                    status: 'متوفر',
                    currentLocation: 'المخزن الرئيسي',
                    lastUpdated: new Date()
                });
                
                await db.transactions.add({
                    itemId: itemId,
                    actionType: 'إرجاع',
                    destination: 'المخزن الرئيسي',
                    notes: 'إرجاع المعدة للمخزن',
                    timestamp: new Date()
                });
                
                showToast('✅ تم إرجاع المعدة للمخزن', 'success');
                updateStats();
                showItems();
            } catch (error) {
                showToast('❌ فشلت العملية: ' + error.message, 'error');
            }
        }

        async function deleteItem(itemId) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذه المعدة؟')) return;
            
            try {
                await db.items.delete(itemId);
                await db.transactions.where('itemId').equals(itemId).delete();
                showToast('✅ تم حذف المعدة', 'success');
                updateStats();
                showItems();
            } catch (error) {
                showToast('❌ فشل الحذف: ' + error.message, 'error');
            }
        }

        // ==================== Export Functions ====================
        function showExport() {
            const content = document.getElementById('contentArea');
            content.innerHTML = `
                <div class="glass-dark p-8 animate__animated animate__fadeIn">
                    <h2 class="text-2xl font-bold text-white mb-6">
                        <i class="fas fa-database ml-2 text-purple-400"></i>
                        إدارة البيانات
                    </h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="glass-card p-6 hover:border-purple-500/30 transition-all">
                            <i class="fas fa-file-export text-3xl text-purple-400 mb-3"></i>
                            <h3 class="text-lg font-bold text-white mb-4">التصدير</h3>
                            <div class="space-y-3">
                                <button onclick="exportJSON()" class="w-full btn-gradient-primary text-white py-3 rounded-lg flex items-center justify-center gap-2">
                                    <i class="fas fa-download"></i> JSON (نسخة احتياطية)
                                </button>
                                <button onclick="exportExcel()" class="w-full btn-gradient-success text-white py-3 rounded-lg flex items-center justify-center gap-2">
                                    <i class="fas fa-file-excel"></i> Excel
                                </button>
                                <button onclick="exportCSV()" class="w-full btn-gradient-primary text-white py-3 rounded-lg flex items-center justify-center gap-2">
                                    <i class="fas fa-file-csv"></i> CSV
                                </button>
                            </div>
                        </div>
                        
                        <div class="glass-card p-6 hover:border-green-500/30 transition-all">
                            <i class="fas fa-share-alt text-3xl text-green-400 mb-3"></i>
                            <h3 class="text-lg font-bold text-white mb-4">المشاركة</h3>
                            <div class="space-y-3">
                                <button onclick="shareToWhatsApp()" class="w-full bg-green-600/30 hover:bg-green-600/50 text-white py-3 rounded-lg border border-green-500/30 flex items-center justify-center gap-2">
                                    <i class="fab fa-whatsapp"></i> تقرير سريع
                                </button>
                                <button onclick="shareDetailedReport()" class="w-full bg-green-600/30 hover:bg-green-600/50 text-white py-3 rounded-lg border border-green-500/30 flex items-center justify-center gap-2">
                                    <i class="fas fa-file-alt"></i> تقرير مفصل
                                </button>
                            </div>
                        </div>
                        
                        <div class="glass-card p-6 md:col-span-2 hover:border-yellow-500/30 transition-all">
                            <i class="fas fa-file-import text-3xl text-yellow-400 mb-3"></i>
                            <h3 class="text-lg font-bold text-white mb-4">الاستيراد</h3>
                            
                            <div id="dropZone" class="drop-zone p-8 text-center border-2 border-dashed border-purple-500/30 rounded-2xl hover:border-purple-500 transition-all">
                                <i class="fas fa-cloud-upload-alt text-4xl text-gray-500 mb-3"></i>
                                <p class="text-gray-400 mb-2">اسحب ملف JSON هنا أو</p>
                                <label class="btn-gradient-primary text-white px-6 py-2 rounded-lg cursor-pointer inline-block">
                                    <i class="fas fa-folder-open ml-1"></i> اختر ملفاً
                                    <input type="file" accept=".json" onchange="importJSON(this)" class="hidden">
                                </label>
                                <p class="text-xs text-red-400/70 mt-4">
                                    <i class="fas fa-exclamation-triangle ml-1"></i>
                                    تحذير: استيراد ملف جديد سيحل محل البيانات الحالية
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Setup drag & drop
            const dropZone = document.getElementById('dropZone');
            if (dropZone) {
                ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                    dropZone.addEventListener(eventName, preventDefaults, false);
                });
                
                function preventDefaults(e) {
                    e.preventDefault();
                    e.stopPropagation();
                }
                
                ['dragenter', 'dragover'].forEach(eventName => {
                    dropZone.addEventListener(eventName, () => {
                        dropZone.classList.add('border-purple-500', 'bg-purple-500/10');
                    });
                });
                
                ['dragleave', 'drop'].forEach(eventName => {
                    dropZone.addEventListener(eventName, () => {
                        dropZone.classList.remove('border-purple-500', 'bg-purple-500/10');
                    });
                });
                
                dropZone.addEventListener('drop', (e) => {
                    const file = e.dataTransfer.files[0];
                    if (file && file.type === 'application/json') {
                        importJSON({ files: [file] });
                    } else {
                        showToast('الرجاء اختيار ملف JSON صالح', 'error');
                    }
                });
            }
        }

        async function exportJSON() {
            try {
                const items = await db.items.toArray();
                const transactions = await db.transactions.toArray();
                
                const data = {
                    items,
                    transactions,
                    exportDate: new Date().toISOString(),
                    version: '3.0',
                    totalItems: items.length
                };
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                saveAs(blob, `inventory_backup_${new Date().toISOString().split('T')[0]}.json`);
                showToast('✅ تم تصدير النسخة الاحتياطية', 'success');
            } catch (error) {
                showToast('❌ فشل التصدير: ' + error.message, 'error');
            }
        }

        async function exportExcel() {
            try {
                const items = await db.items.toArray();
                const data = items.map(item => ({
                    'الكود': item.qrCode,
                    'الاسم': item.name,
                    'رقم الموديل': item.modelNumber || '',
                    'التصنيف': item.category,
                    'الحالة': item.status,
                    'الموقع': item.currentLocation,
                    'تاريخ الإضافة': new Date(item.createdAt).toLocaleDateString('ar-EG'),
                    'آخر تحديث': new Date(item.lastUpdated || item.createdAt).toLocaleDateString('ar-EG')
                }));
                
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "المخزون");
                XLSX.writeFile(wb, `inventory_report_${new Date().toISOString().split('T')[0]}.xlsx`);
                showToast('✅ تم تصدير Excel', 'success');
            } catch (error) {
                showToast('❌ فشل التصدير: ' + error.message, 'error');
            }
        }

        async function exportCSV() {
            try {
                const items = await db.items.toArray();
                let csv = 'الكود,الاسم,رقم الموديل,التصنيف,الحالة,الموقع,تاريخ الإضافة,آخر تحديث\n';
                
                items.forEach(item => {
                    csv += `"${item.qrCode}","${item.name}","${item.modelNumber || ''}","${item.category}","${item.status}","${item.currentLocation}","${new Date(item.createdAt).toLocaleDateString('ar-EG')}","${new Date(item.lastUpdated || item.createdAt).toLocaleDateString('ar-EG')}"\n`;
                });
                
                const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                saveAs(blob, `inventory_${new Date().toISOString().split('T')[0]}.csv`);
                showToast('✅ تم تصدير CSV', 'success');
            } catch (error) {
                showToast('❌ فشل التصدير: ' + error.message, 'error');
            }
        }

        async function shareToWhatsApp() {
            try {
                const items = await db.items.toArray();
                const available = items.filter(i => i.status === 'متوفر').length;
                const issued = items.filter(i => i.status === 'مصروف').length;
                const maintenance = items.filter(i => i.status === 'صيانة').length;
                
                let message = `📊 *تقرير المخزون*\n`;
                message += `📅 ${new Date().toLocaleDateString('ar-EG')}\n`;
                message += `━━━━━━━━━━━━━━\n`;
                message += `📦 الإجمالي: ${items.length}\n`;
                message += `✅ المتاح: ${available}\n`;
                message += `📤 المصروف: ${issued}\n`;
                message += `🔧 تحت الصيانة: ${maintenance}\n`;
                message += `━━━━━━━━━━━━━━\n`;
                message += `تم التصدير من Inventory Pro`;
                
                const url = `https://wa.me/?text=${encodeURIComponent(message)}`;
                window.open(url, '_blank');
            } catch (error) {
                showToast('❌ فشل المشاركة: ' + error.message, 'error');
            }
        }

        async function shareDetailedReport() {
            try {
                const items = await db.items.toArray();
                let content = `📋 *تقرير المخزون المفصل*\n`;
                content += `📅 التاريخ: ${new Date().toLocaleDateString('ar-EG')}\n`;
                content += `⏰ الوقت: ${new Date().toLocaleTimeString('ar-EG')}\n`;
                content += `━━━━━━━━━━━━━━━━━━━━\n\n`;
                
                items.forEach((item, idx) => {
                    const statusIcon = item.status === 'متوفر' ? '✅' : item.status === 'مصروف' ? '📤' : '🔧';
                    content += `*${idx + 1}. ${item.name}*\n`;
                    content += `${statusIcon} الحالة: ${item.status}\n`;
                    content += `🔖 الكود: ${item.qrCode}\n`;
                    if (item.modelNumber) content += `🔢 الموديل: ${item.modelNumber}\n`;
                    content += `📍 الموقع: ${item.currentLocation}\n`;
                    content += `📂 التصنيف: ${item.category}\n`;
                    content += `━━━━━━━━━━━━━━━━━━━━\n`;
                });
                
                const url = `https://wa.me/?text=${encodeURIComponent(content)}`;
                window.open(url, '_blank');
            } catch (error) {
                showToast('❌ فشل المشاركة: ' + error.message, 'error');
            }
        }

        async function importJSON(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (!data.items || !Array.isArray(data.items)) {
                        throw new Error('ملف غير صالح');
                    }
                    
                    if (!confirm(`⚠️ سيتم استيراد ${data.items.length} معدة. هل تريد المتابعة؟`)) return;
                    
                    await db.items.clear();
                    await db.transactions.clear();
                    
                    if (data.items.length > 0) await db.items.bulkAdd(data.items);
                    if (data.transactions?.length > 0) await db.transactions.bulkAdd(data.transactions);
                    
                    showToast(`✅ تم استيراد ${data.items.length} معدة بنجاح`, 'success');
                    updateStats();
                    showItems();
                } catch (error) {
                    showToast('❌ فشل الاستيراد: ' + error.message, 'error');
                }
            };
            reader.readAsText(file);
        }

        // ==================== Escape Key Handler ====================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (scannerRunning) {
                    stopScanner();
                } else {
                    document.getElementById('contentArea').innerHTML = '';
                }
            }
        });

        // ==================== Initialization ====================
        window.onload = async () => {
            updateStats();
            showItems();
        };
    </script>
